# Niche definitions with seed keywords and preferred palettes

niches:
  adhd_planner:
    name: "ADHD Planner"
    # Documentation only -- the authoritative niche->motif policy lives in
    # src/planner/niche_themes.py (NICHE_MOTIFS). Themed primary; abstract
    # geometric/minimal are the fallbacks.
    theme_motif: "focus"
    seed_keywords:
      - "adhd planner"
      - "adhd daily planner"
      - "neurodivergent planner"
      - "executive function planner"
    modifiers:
      - "digital"
      - "printable"
      - "pdf"
      - "ipad"
      - "goodnotes"
    preferred_palettes:
      - "soft_sage"
      - "boho_pink"
      - "neutral_beige"
      - "mint_cream"
      - "lavender_haze"
    subtitle: "Stay organized with a planner designed for ADHD minds"
    features:
      - "Brain dump sections"
      - "Priority matrix"
      - "Time blocking"
      - "Habit tracker"
    niche_pages:
      - id: brain_dump
        label: "Brain Dump"
        tab: "DUMP"
      - id: priority_matrix
        label: "Priority Matrix"
        tab: "PRIORITY"
      - id: time_blocking
        label: "Time Blocking"
        tab: "BLOCKS"
      - id: routine_builder
        label: "Routine Builder"
        tab: "ROUTINES"
      - id: parking_lot
        label: "Idea Parking Lot"
        tab: "IDEAS"
      - id: energy_tracker
        label: "Energy Tracker"
        tab: "ENERGY"

