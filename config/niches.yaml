# Niche definitions with seed keywords and preferred palettes

niches:
  adhd_planner:
    name: "ADHD Planner"
    seed_keywords:
      - "adhd planner"
      - "adhd daily planner"
      - "neurodivergent planner"
      - "executive function planner"
    modifiers:
      - "digital"
      - "printable"
      - "pdf"
      - "ipad"
      - "goodnotes"
    preferred_palettes:
      - "soft_sage"
      - "boho_pink"
      - "neutral_beige"
    subtitle: "Stay organized with a planner designed for ADHD minds"
    features:
      - "Brain dump sections"
      - "Priority matrix"
      - "Time blocking"
      - "Habit tracker"
    niche_pages:
      - id: brain_dump
        label: "Brain Dump"
        tab: "DUMP"
      - id: priority_matrix
        label: "Priority Matrix"
        tab: "PRIORITY"
      - id: time_blocking
        label: "Time Blocking"
        tab: "BLOCKS"
      - id: routine_builder
