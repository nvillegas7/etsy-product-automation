fonts:
  primary:
    family: "Inter"
    regular: "Inter-Regular.ttf"
    bold: "Inter-Bold.ttf"
    light: "Inter-Light.ttf"
    source_url: "https://fonts.google.com/specimen/Inter"
  # Serif display face for large titles (cover, page headers).
  # Playfair Display static files are tried first; DM Serif Display is the
  # reliable fallback that exists in the google/fonts repo.
  display:
    family: "PlannerDisplay"
    regular: "DisplaySerif-Regular.ttf"
    bold: "DisplaySerif-Bold.ttf"
    candidates:
      regular:
        - "https://raw.githubusercontent.com/google/fonts/main/ofl/playfairdisplay/static/PlayfairDisplay-Regular.ttf"
        - "https://raw.githubusercontent.com/google/fonts/main/ofl/dmserifdisplay/DMSerifDisplay-Regular.ttf"
      bold:
        - "https://raw.githubusercontent.com/google/fonts/main/ofl/playfairdisplay/static/PlayfairDisplay-Bold.ttf"
        - "https://raw.githubusercontent.com/google/fonts/main/ofl/dmserifdisplay/DMSerifDisplay-Regular.ttf"
  # Script accent face for month names / pennant flags.
  script:
    family: "PlannerScript"
    regular: "ScriptAccent-Regular.ttf"
    candidates:
      regular:
        - "https://raw.githubusercontent.com/google/fonts/main/ofl/greatvibes/GreatVibes-Regular.ttf"
  sizes:
    title: 36
    subtitle: 18
    heading: 14
    body: 11
    small: 9
    tab: 8
    display_title: 46
    page_title: 19
    section: 8.5
    pennant: 15
