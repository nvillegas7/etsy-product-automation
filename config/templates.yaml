    background: "#F3EFE6"
    primary: "#B26547"
    secondary: "#E3C4A8"
    accent: "#A85A3C"
    text: "#3B2F2A"
    text_light: "#8A7360"
    grid_line: "#E6DACB"
    tab_active: "#B26547"
    tab_inactive: "#EDE4D6"

  sage_linen:
